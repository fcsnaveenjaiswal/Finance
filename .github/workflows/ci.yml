name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run demo smoke scripts
        run: |
          python3 accounts_hack.py
          python3 gst_hack.py
          python3 payroll_hack.py

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check .
